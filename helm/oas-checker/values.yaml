# -- OAS Checker e-service Helm Values

# =============================================================================
# E-Service (FastAPI)
# =============================================================================
eservice:
  replicaCount: 1

  image:
    repository: ghcr.io/italia/oas-checker-eservice
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  extraEnv: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # Probes
  startupProbe:
    httpGet:
      path: /status
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 12
  livenessProbe:
    httpGet:
      path: /status
      port: http
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /status
      port: http
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # Application config
  config:
    openApiServerUrl: ""  # auto-generated if empty
    logLevel: INFO
    functionType: azure-local  # mock | azure | azure-local
    jwtEnabled: "true"
    hmacEnabled: "true"
    hmacTimestampWindow: "300"
    rulesetRepo: italia/api-oas-checker-rules
    rulesetVersion: latest
    rulesetAutoUpdate: "true"
    openApiGenerateOnStartup: "false"
    rateLimitEnabled: "true"
    rateLimitValidateRequests: "10"
    rateLimitValidateWindow: "60"
    rateLimitReportRequests: "60"
    rateLimitReportWindow: "60"
    rateLimitDefaultRequests: "30"
    rateLimitDefaultWindow: "60"
    rateLimitCleanupHours: "24"

# =============================================================================
# Worker Spectral (validation engine)
# =============================================================================
worker:
  # -- Worker mode: "knative" | "deployment" | "external"
  # knative:    creates a Knative Service (requires Knative Serving in cluster)
  # deployment: creates a standard K8s Deployment + Service
  # external:   no resources created; eservice points to worker.externalUrl
  mode: knative

  # -- URL for external worker (only used when mode=external)
  # Example: https://my-func.azurewebsites.net/api/validate
  externalUrl: ""

  image:
    repository: ghcr.io/italia/oas-checker-function
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  # Only used when mode=deployment
  replicaCount: 1

  service:
    type: ClusterIP
    port: 8080

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  extraEnv: {}

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true

  # NOTE: Knative does not allow capabilities.add/drop in securityContext.
  # When mode=knative, do not set capabilities here.
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    runAsNonRoot: true

  # Knative-specific settings (only used when mode=knative)
  knative:
    minScale: 0
    maxScale: 5
    concurrencyTarget: 10
    concurrencyLimit: 0  # 0 = unlimited
    scaleDownDelay: "60s"
    containerPort: 8080

  # Probes (used in deployment mode; Knative manages its own)
  startupProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 12
  livenessProbe:
    httpGet:
      path: /
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: http
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# GovWay (optional API gateway)
# =============================================================================
govway:
  enabled: false

  image:
    repository: linkitaly/govway
    tag: "3.4.2.p1"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    ports:
      http: 8080
      https: 8081
      management: 8082

  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

  extraEnv: {}
  entityName: ente-example
  popDbSkip: "false"

  # Database configuration (external PostgreSQL)
  database:
    type: postgresql
    server: ""       # host:port
    name: govway
    user: govway
    password: ""

  # JWKS file for JWT validation (mounted at /etc/govway/jwks.json)
  jwks:
    data: ""  # JSON content of JWKS file; leave empty to skip mounting

  # PEM keys for GovWay (mounted at /etc/govway/keys/)
  keys:
    publicKey: ""   # PEM public key; leave empty to skip mounting
    privateKey: ""  # PEM private key; leave empty to skip mounting

  # Persistence for GovWay configuration (/etc/govway)
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
    accessModes:
      - ReadWriteOnce

  # Probes (GovWay/Tomcat needs longer startup)
  startupProbe:
    httpGet:
      path: /govway/check
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
  livenessProbe:
    httpGet:
      path: /govway/check
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /govway/check
      port: http
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

  # GovWay upstream image requires root; drop capabilities as mitigation
  podSecurityContext:
    fsGroup: 1000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE
    seccompProfile:
      type: RuntimeDefault

# =============================================================================
# PostgreSQL (Bitnami subchart) - for dev/test
# =============================================================================
# Set postgresql.enabled=true to deploy PostgreSQL in-cluster via Bitnami.
# Set postgresql.enabled=false to use an external shared database.
postgresql:
  enabled: false
  auth:
    username: oaschecker
    password: oaschecker
    database: oaschecker

# =============================================================================
# External Database - for production (used when postgresql.enabled=false)
# =============================================================================
externalDatabase:
  # Full connection URL (takes precedence over individual fields)
  # Example: postgresql://user:pass@db.example.com:5432/oaschecker
  url: ""
  # Individual fields (used to build URL if externalDatabase.url is empty)
  host: ""
  port: 5432
  user: oaschecker
  password: ""
  database: oaschecker

# =============================================================================
# Secrets
# =============================================================================
secrets:
  # -- Use an existing secret instead of creating one.
  # The secret must contain keys: DATABASE_URL, CALLBACK_SECRET
  # and optionally AZURE_FUNCTION_KEY
  existingSecret: ""

  # Values below are ignored if existingSecret is set
  callbackSecret: "change-me-in-production"
  azureFunctionKey: ""

# =============================================================================
# Ingress
# =============================================================================
ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: oas-checker.example.com
      paths:
        - path: /
          pathType: Prefix
          service: eservice
  tls: []
  #  - secretName: oas-checker-tls
  #    hosts:
  #      - oas-checker.example.com

# =============================================================================
# Ruleset Cache
# =============================================================================
rulesetCache:
  enabled: true
  # persistence: true uses a PVC (requires ReadWriteMany for multi-replica)
  # persistence: false uses emptyDir (each pod downloads rulesets on startup)
  persistence: false
  size: 1Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# =============================================================================
# Network Policies
# =============================================================================
networkPolicy:
  enabled: true

  # Namespace label selector for the ingress controller
  ingressNamespaceSelector:
    kubernetes.io/metadata.name: ingress-nginx

  # Allow egress to external HTTPS (GitHub API for ruleset downloads)
  allowExternalHttps: true

  # External database CIDR (set to restrict DB egress to specific IPs)
  # Leave empty to allow egress to any IP on port 5432
  externalDatabaseCidr: ""

# =============================================================================
# Autoscaling (HPA for eservice)
# =============================================================================
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# =============================================================================
# Monitoring (Prometheus Operator)
# =============================================================================
metrics:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
    # release: kube-prometheus-stack

  prometheusRule:
    enabled: false
    labels: {}
    # release: kube-prometheus-stack

  alertmanagerConfig:
    enabled: false
    # Namespace where Alertmanager is deployed
    namespace: monitoring
    labels:
      alertmanagerConfig: main
    # SMTP configuration (uses shared secret for credentials)
    smtp:
      from: "oas-checker@innovazione.gov.it"
      smarthost: "smtp.eu.mailgun.org:587"
      authUsername: "oas-checker@innovazione.gov.it"
      authPasswordSecret:
        name: alertmanager-smtp-secret
        key: password
      requireTLS: true
    # Email recipients for alerts
    recipients:
      - "r.vitiello@innovazione.gov.it"

# =============================================================================
# Service Account
# =============================================================================
serviceAccount:
  create: true
  name: ""
  annotations: {}
