{{- if eq .Values.worker.mode "deployment" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "oas-checker.fullname" . }}-worker
  labels:
    {{- include "oas-checker.worker.labels" . | nindent 4 }}
spec:
  type: {{ .Values.worker.service.type }}
  ports:
    - port: {{ .Values.worker.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "oas-checker.worker.selectorLabels" . | nindent 4 }}
{{- end }}
