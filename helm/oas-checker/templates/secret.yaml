{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "oas-checker.fullname" . }}
  labels:
    {{- include "oas-checker.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ include "oas-checker.databaseUrl" . | quote }}
  CALLBACK_SECRET: {{ .Values.secrets.callbackSecret | quote }}
  {{- if .Values.secrets.azureFunctionKey }}
  AZURE_FUNCTION_KEY: {{ .Values.secrets.azureFunctionKey | quote }}
  {{- end }}
{{- end }}
