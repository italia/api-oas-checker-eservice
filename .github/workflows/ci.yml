name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: arc-runner-oas-checker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -m "not integration and not e2e" --tb=short -q

  lint-helm:
    name: Lint Helm Chart
    runs-on: arc-runner-oas-checker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm dependency update
        run: helm dependency update helm/oas-checker

      - name: Helm lint
        run: |
          helm lint helm/oas-checker --strict \
            --set externalDatabase.host=db.example.com \
            --set externalDatabase.password=test
