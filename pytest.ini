[pytest]
markers =
    integration: marks tests as integration tests (require PostgreSQL, slower)
    e2e: marks tests as end-to-end tests (require full stack)

# Only collect tests from the tests/ directory
testpaths = tests

# Asyncio mode for async tests
asyncio_mode = auto

# Coverage configuration
addopts = --cov=api --cov=models --cov=services --cov=database --cov-report=term-missing --cov-report=html
