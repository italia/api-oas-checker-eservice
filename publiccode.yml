description:
  it:
    shortDescription: Servizio di validazione OpenAPI (OAS) tramite Spectral.
    longDescription: |
      OAS Checker è un e-service che permette la validazione di file OpenAPI (YAML/JSON)
      utilizzando le regole definite da Spectral. Il servizio opera in modalità asincrona
      delegando la validazione a una Azure Function e notificando i risultati tramite callback.
